[phases.setup]
# Installer PHP et Nginx
nixPkgs = ["php", "nginx", "nodejs", "npm"]

[variables]
# Racine web = public
NIXPACKS_PHP_ROOT_DIR = "public"
# Fallback Symfony
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"
# Environnement Symfony
APP_ENV = "prod"
APP_DEBUG = "0"

[phases.build]
cmds = [
  # Installer PHP dependencies
  "composer install --no-dev --optimize-autoloader",


  # Générer l'asset map Symfony
  "php bin/console asset-map:compile",

  # Nettoyer le cache
  "php bin/console cache:clear --env=prod"
]

[phases.start]
# Démarrer PHP-FPM et Nginx
cmd = "php-fpm -D && nginx -g 'daemon off;'"